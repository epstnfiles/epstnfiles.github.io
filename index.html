<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:white; transition:0.6s; }

/* TOP */
.top { padding:20px 16px; text-align:center; background:#0f0f0f; box-shadow:0 3px 10px rgba(0,0,0,.5); position:sticky; top:0; z-index:100; }
.logo { 
  font-size:32px; 
  font-weight:900; 
  letter-spacing:1.5px; 
  color:#8a2be2; 
  margin-bottom:16px; 
  text-transform:uppercase; 
  font-family:'Inter', system-ui, -apple-system, sans-serif; /* Cleaner, pro font */
  text-shadow:0 2px 10px rgba(138,43,226,0.4); /* Subtle designer glow */
}

/* SEARCH BAR - upgraded */
.searchbar { display:flex; justify-content:center; }
.searchbox { 
  display:flex; align-items:center; 
  background:#1c1c1c; 
  border:2px solid transparent; 
  border-radius:50px; 
  padding:10px 18px; 
  width:90%; max-width:450px; 
  transition:0.3s; 
}
.searchbox:focus-within { 
  border-color:#8a2be2; 
  box-shadow:0 0 15px rgba(138,43,226,0.5); 
}
.searchbox input { 
  background:transparent; 
  border:none; outline:none; 
  color:white; font-size:15px; width:100%; 
}
.searchbox span { 
  margin-left:12px; 
  font-size:20px; 
  opacity:0.8; 
  color:#8a2be2; 
}

/* GRID & rest unchanged */
.grid { display:grid; grid-template-columns:1fr; gap:18px; padding:18px; max-width:1100px; margin:auto; transition:0.6s; }
#fade-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; opacity:0; pointer-events:none; z-index:990; transition:opacity 0.5s; }
#fade-overlay.active { opacity:0.92; pointer-events:all; }
.card { position:relative; overflow:hidden; border-radius:16px; background:#111; box-shadow:0 6px 18px rgba(0,0,0,.5); transition:0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor:pointer; }
.card:hover { transform:translateY(-6px); }
.card.active { transform:scale(1.18) !important; box-shadow:0 0 80px rgba(93,162,255,0.85); z-index:9999 !important; }
.card .play { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:70px; height:70px; border-radius:50%; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; font-size:30px; z-index:5; transition:opacity 0.3s ease-out; }
.card.active .play { opacity:0; }
.card .loader { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:70px; height:70px; border-radius:50%; border:6px solid rgba(255,255,255,0.25); border-top:6px solid #5da2ff; animation:spin 1s linear infinite; opacity:0; transition:opacity 0.4s; z-index:5; }
.card.active .loader { opacity:1; }
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
.card img { width:100%; display:block; filter:brightness(.75) blur(1px); transition:.35s; }
.card:hover img { transform:scale(1.08); filter:brightness(.9) blur(.3px); }
.card::after { content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,.4), transparent); }
.caption { position:absolute; bottom:0; left:0; right:0; padding:40px 16px 16px; font-size:22px; font-weight:800; text-align:center; z-index:6; }
.views { position:absolute; bottom:55px; left:16px; background:#8a2be2; padding:4px 10px; border-radius:16px; font-size:13px; font-weight:bold; z-index:7; }
.duration { position:absolute; bottom:55px; right:16px; background:rgba(0,0,0,.85); padding:3px 7px; border-radius:5px; font-size:12px; font-weight:bold; z-index:7; }

@media (min-width:650px) { .grid { grid-template-columns:repeat(2,1fr); } }
</style>

<script>

    card.classList.add('active');
    grid.classList.add('fading');
    overlay.classList.add('active');

      setTimeout(() => {

});
