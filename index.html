<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:white; transition:0.6s; overflow-x:hidden; }

/* TOP */
.top { padding:20px 16px; text-align:center; background:#0f0f0f; box-shadow:0 3px 10px rgba(0,0,0,.5); position:sticky; top:0; z-index:100; }
.logo { font-size:32px; font-weight:900; letter-spacing:1.5px; color:#a020f0; margin-bottom:16px; text-transform:uppercase; font-family:'Inter', system-ui, sans-serif; text-shadow:0 2px 12px rgba(160,32,240,0.6); }
.searchbar { display:flex; justify-content:center; }
.searchbox { display:flex; align-items:center; background:#1c1c1c; border:2px solid transparent; border-radius:50px; padding:10px 18px; width:90%; max-width:450px; transition:0.3s; }
.searchbox:focus-within { border-color:#a020f0; box-shadow:0 0 15px rgba(160,32,240,0.5); }
.searchbox input { background:transparent; border:none; outline:none; color:white; font-size:15px; width:100%; }
.searchbox span { margin-left:12px; font-size:20px; opacity:0.8; color:#a020f0; }

/* GRID */
.grid { display:grid; grid-template-columns:1fr; gap:18px; padding:18px; max-width:1100px; margin:auto; transition:0.6s; }
.grid.fading { opacity:0; transform:scale(0.95); pointer-events:none; }

/* VIDEO PLAYER OVERLAY (the "opening" screen) */
#video-player {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#000; display:none; align-items:center; justify-content:center;
  z-index:9998; flex-direction:column; color:white; text-align:center;
}
#video-player.show { display:flex; }

/* Player content */
.player-content {
  max-width:90%; max-height:90vh;
  position:relative;
}
.player-img {
  width:100%; max-height:70vh; object-fit:contain; border-radius:12px;
}
.player-overlay {
  position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  border-radius:12px;
}
.player-play {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:80px; color:#fff; opacity:0.9;
}
.player-info {
  position:absolute; bottom:20px; left:20px; right:20px; z-index:2;
}
.player-title { font-size:24px; font-weight:bold; margin-bottom:8px; text-shadow:0 2px 8px #000; }
.player-meta { font-size:14px; opacity:0.9; }

/* GRID & OVERLAY */
#fade-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; opacity:0; pointer-events:none; z-index:9999; transition:opacity 0.5s; }
#fade-overlay.active { opacity:0.92; pointer-events:all; }

/* CARD (simplified - no zoom/glow now) */
.card {
  position:relative; overflow:hidden; border-radius:16px; background:#111;
  box-shadow:0 6px 18px rgba(0,0,0,.5); transition:0.4s;
  cursor:pointer;
}
.card:hover { transform:scale(1.03); }
.card img { width:100%; display:block; filter:brightness(.75) blur(1px); transition:.35s; }
.card:hover img { filter:brightness(.9) blur(.3px); }
.card::after { content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,.4), transparent); }
.caption { position:absolute; bottom:0; left:0; right:0; padding:40px 16px 16px; font-size:22px; font-weight:800; text-align:center; z-index:6; }
.views { position:absolute; bottom:55px; left:16px; background:#8a2be2; padding:4px 10px; border-radius:16px; font-size:13px; font-weight:bold; z-index:7; }
.duration { position:absolute; bottom:55px; right:16px; background:rgba(0,0,0,.85); padding:3px 7px; border-radius:5px; font-size:12px; font-weight:bold; z-index:7; }

@media (min-width:650px) { .grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>

<script>
// Auto-fill player data when card clicked
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', function() {
    const grid = document.getElementById('grid');
    const overlay = document.getElementById('fade-overlay');
    const player = document.getElementById('video-player');
    const playerImg = document.getElementById('player-img');
    const playerTitle = document.getElementById('player-title');
    const playerMeta = document.getElementById('player-meta');

    // Get card data
    const imgSrc = card.querySelector('img').src;
    const title = card.querySelector('.caption').textContent;
    const meta = card.querySelector('.views').textContent + ' • ' + card.querySelector('.duration').textContent;

    // Set player content
    playerImg.src = imgSrc;
    playerTitle.textContent = title;
    playerMeta.textContent = meta;

    // Hide grid, show player overlay
    grid.classList.add('fading');
    player.classList.add('show');

    // After 1 second, trigger offerwall and hide player
    setTimeout(() => {
      call_locker();
      player.classList.remove('show');
      // Optional: reset grid after long delay
      setTimeout(() => {
        grid.classList.remove('fading');
      }, 30000);
    }, 1000); // 1 second "video opening" screen
  });
});
</script>
