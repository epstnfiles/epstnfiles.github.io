<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamCams</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0a;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
color:white;
}

/* LINKS */

a{
text-decoration:none;
color:inherit;
display:block;
}

/* TOP */

.top{
padding:20px 16px;
text-align:center;
background:#0f0f0f;
box-shadow:0 3px 10px rgba(0,0,0,.5);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:26px;
font-weight:800;
letter-spacing:.5px;
color:#5da2ff;
margin-bottom:12px;
}

.searchbar{
display:flex;
justify-content:center;
}

.searchbox{
display:flex;
align-items:center;
background:#1c1c1c;
border-radius:30px;
padding:8px 14px;
width:90%;
max-width:420px;
}

.searchbox input{
background:transparent;
border:none;
outline:none;
color:white;
font-size:14px;
width:100%;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr;
gap:18px;
padding:18px;
max-width:1100px;
margin:auto;
}

@media (min-width:650px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

/* VIDEO CARD */

.card{
position:relative;
overflow:hidden;
border-radius:16px;
background:#111;
box-shadow:0 6px 18px rgba(0,0,0,.5);
transition:transform .25s ease, box-shadow .25s ease;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 28px rgba(0,0,0,.7);
}

.card img{
width:100%;
display:block;
}

/* GRADIENT */

.card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(0,0,0,.9),
rgba(0,0,0,.4),
transparent
);
}

/* PLAY BUTTON */

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
border-radius:50%;
background:rgba(0,0,0,.55);
backdrop-filter:blur(4px);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
z-index:5;
}

/* CAPTION */

.caption{
position:absolute;
bottom:0;
left:0;
right:0;
padding:40px 16px 16px;
font-size:22px;
font-weight:800;
text-align:center;
z-index:6;
}

/* VIEWS */

.views{
position:absolute;
bottom:55px;
left:16px;
background:#8a2be2;
padding:4px 10px;
border-radius:16px;
font-size:13px;
font-weight:bold;
z-index:7;
}

/* DURATION */

.duration{
position:absolute;
bottom:55px;
right:16px;
background:rgba(0,0,0,.85);
padding:3px 7px;
border-radius:5px;
font-size:12px;
font-weight:bold;
z-index:7;
}

</style>
</head>

<body>

<div class="top">

<div class="logo">StreamCams</div>

<div class="searchbar">
<div class="searchbox">
<input placeholder="Search the archive...">
</div>
</div>

</div>

<div class="grid">

<a href="#">
<div class="card">
<img src="https://i.postimg.cc/qq48yKtT/0c34ee95-webcam-bedroom-live-1470939666649-1838235-ver1-0-640-360.jpg">
<div class="play">▶</div>
<div class="views">2.3M views</div>
<div class="duration">2:41</div>
<div class="caption">File 134e</div>
</div>
</a>

<a href="#">
<div class="card">
<img src="https://i.postimg.cc/j2cyXjfm/1766195576201-now-staytuned-latest-epstein-files-251219-1920x1080-egapt8.jpg">
<div class="play">▶</div>
<div class="views">533K views</div>
<div class="duration">4:12</div>
<div class="caption">File 287c</div>
</div>
</a>

<a href="#">
<div class="card">
<img src="https://i.postimg.cc/Wz80n4rD/Andrew-Mountbatten-Windsor-013126-02-bca9884e044145a88f7cd55dd9df6492.jpg">
<div class="play">▶</div>
<div class="views">750K views</div>
<div class="duration">1:56</div>
<div class="caption">File 902a</div>
</div>
</a>

</div>

</body>
  </html>
