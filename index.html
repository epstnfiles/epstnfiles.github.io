<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:white; }

/* TOP */
.top { padding:20px 16px; text-align:center; background:#0f0f0f; box-shadow:0 3px 10px rgba(0,0,0,.5); position:sticky; top:0; z-index:100; }
.logo { font-size:32px; font-weight:900; letter-spacing:1.5px; color:#a020f0; margin-bottom:16px; text-transform:uppercase; text-shadow:0 2px 12px rgba(160,32,240,0.6); }
.searchbar { display:flex; justify-content:center; }
.searchbox { display:flex; align-items:center; background:#1c1c1c; border:2px solid transparent; border-radius:50px; padding:10px 18px; width:90%; max-width:450px; transition:0.3s; }
.searchbox:focus-within { border-color:#a020f0; box-shadow:0 0 15px rgba(160,32,240,0.5); }
.searchbox input { background:transparent; border:none; outline:none; color:white; font-size:15px; width:100%; }
.searchbox span { margin-left:12px; font-size:20px; opacity:0.8; color:#a020f0; }

/* GRID */
.grid { display:grid; grid-template-columns:1fr; gap:18px; padding:18px; max-width:1100px; margin:auto; transition:0.5s; }
.grid.opening { opacity:0; transform:scale(0.95); pointer-events:none; }

/* VIDEO PLAYER OVERLAY */
#video-player {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#000; display:none; flex-direction:column; align-items:center; justify-content:center;
  z-index:9998; color:white; text-align:center;
}
#video-player.show { display:flex; }

/* Player content */
.player-content {
  width:90%; max-width:800px; max-height:85vh;
  display:flex; flex-direction:column; align-items:center; position:relative;
}
.player-img-container {
  position:relative; width:100%; max-height:70vh; margin-bottom:20px;
}
.player-img {
  width:100%; height:auto; max-height:70vh; object-fit:contain; border-radius:12px;
  filter: brightness(0.6) blur(2.5px) !important;
}
.player-play-btn {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:120px; height:120px; border-radius:50%; background:rgba(0,0,0,0.6);
  display:flex; align-items:center; justify-content:center; font-size:60px; color:white;
  cursor:pointer; z-index:10; transition:opacity 0.3s;
}
.player-play-btn.hidden { opacity:0; pointer-events:none; }
.player-loader {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:100px; height:100px; border:8px solid rgba(255,255,255,0.3);
  border-top:8px solid #a020f0; border-radius:50%;
  animation:spin 1s linear infinite;
  display:none;
}
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
.player-progress {
  position:absolute; bottom:0; left:0; right:0; height:40px;
  background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; font-size:14px; color:#ddd; opacity:0; transition:opacity 0.3s;
}
.player-progress.visible { opacity:1; }
.player-info {
  text-align:center; margin-top:16px;
}
.player-title { font-size:26px; font-weight:bold; margin-bottom:8px; }
.player-meta { font-size:16px; opacity:0.9; }

/* Go back button */
#go-back-btn {
  position:absolute; top:20px; right:20px; z-index:10000;
  background:rgba(0,0,0,0.7); color:white; border:none; padding:10px 16px;
  border-radius:8px; font-size:16px; cursor:pointer; display:flex; align-items:center; gap:8px;
}
#go-back-btn:hover { background:rgba(0,0,0,0.9); }

/* CARD (main grid) */
.card {
  position:relative; overflow:hidden; border-radius:16px; background:#111;
  box-shadow:0 6px 18px rgba(0,0,0,.5); cursor:pointer; transition:0.3s;
}
.card:hover { transform:scale(1.03); }
.card img { width:100%; display:block; filter:brightness(.75) blur(1px); transition:.35s; }
.card:hover img { filter:brightness(.9) blur(.3px); }
.card::after { content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,.4), transparent); }
.caption { position:absolute; bottom:0; left:0; right:0; padding:40px 16px 16px; font-size:22px; font-weight:800; text-align:center; z-index:6; }
.views { position:absolute; bottom:55px; left:16px; background:#8a2be2; padding:4px 10px; border-radius:16px; font-size:13px; font-weight:bold; z-index:7; }
.duration { position:absolute; bottom:55px; right:16px; background:rgba(0,0,0,.85); padding:3px 7px; border-radius:5px; font-size:12px; font-weight:bold; z-index:7; }

/* Play button on main grid */
.card .play {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:70px; height:70px; border-radius:50%; background:rgba(0,0,0,.55);
  display:flex; align-items:center; justify-content:center; font-size:30px; color:white;
  z-index:5; transition:opacity 0.3s ease-out;
}
.card.active .play { opacity:0; }

@media (min-width:650px) { .grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>

<body>

<div class="top">
<div class="logo">Unreleased files</div>
<div class="searchbar">
<div class="searchbox">
<input placeholder="Search the archive...">
<span>✧</span>
</div>
</div>
</div>

<div id="video-player">
  <button id="go-back-btn"><span>×</span> Go back</button>
  <div class="player-content">
    <div class="player-img-container">
      <img id="player-img" class="player-img" src="" alt="">
      <div class="player-play-btn" id="play-btn">▶</div>
      <div class="player-loader" id="player-loader"></div>
      <div class="player-progress" id="player-progress">
        <span id="current-time">0:00</span>
        <span id="total-time"></span>
      </div>
    </div>
    <div class="player-info">
      <div class="player-title" id="player-title"></div>
      <div class="player-meta" id="player-meta"></div>
    </div>
  </div>
</div>

<div class="grid" id="grid">
  <div class="card" data-img="https://i.postimg.cc/qq48yKtT/0c34ee95-webcam-bedroom-live-1470939666649-1838235-ver1-0-640-360.jpg" data-title="File 134e" data-meta="2.3M views • 2:41" data-duration="2:41">
    <img src="https://i.postimg.cc/qq48yKtT/0c34ee95-webcam-bedroom-live-1470939666649-1838235-ver1-0-640-360.jpg">
    <div class="play">▶</div>
    <div class="views">2.3M views</div>
    <div class="duration">2:41</div>
    <div class="caption">File 134e</div>
  </div>
  <!-- Repeat for all 15 cards with data-duration added (same as data-meta duration part) -->
  <!-- For brevity, showing first one - add data-duration="x:yy" to every card matching its duration -->
</div>

<script>
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', function() {
    const grid = document.getElementById('grid');
    const player = document.getElementById('video-player');
    const playerImg = document.getElementById('player-img');
    const playerTitle = document.getElementById('player-title');
    const playerMeta = document.getElementById('player-meta');
    const playBtn = document.getElementById('play-btn');
    const loader = document.getElementById('player-loader');
    const progress = document.getElementById('player-progress');
    const totalTime = document.getElementById('total-time');

    const imgSrc = card.querySelector('img').src;
    const title = card.querySelector('.caption').textContent;
    const meta = card.querySelector('.views').textContent + ' • ' + card.querySelector('.duration').textContent;
    const duration = card.querySelector('.duration').textContent;

    playerImg.src = imgSrc;
    playerTitle.textContent = title;
    playerMeta.textContent = meta;
    totalTime.textContent = duration;

    grid.classList.add('opening');
    player.classList.add('show');
    playBtn.classList.remove('hidden');
    loader.style.display = 'none';
    progress.classList.remove('visible');

    // Play button click
    const handlePlay = () => {
      playBtn.classList.add('hidden');
      loader.style.display = 'block';
      progress.classList.add('visible');

      setTimeout(() => {
        call_locker();
        player.classList.remove('show');
        setTimeout(() => {
          grid.classList.remove('opening');
          // Reset for next click
          playBtn.classList.remove('hidden');
          loader.style.display = 'none';
          progress.classList.remove('visible');
        }, 30000);
      }, 1000);
    };

    playBtn.onclick = handlePlay;

    // Go back button
    document.getElementById('go-back-btn').onclick = () => {
      player.classList.remove('show');
      grid.classList.remove('opening');
      playBtn.classList.remove('hidden');
      loader.style.display = 'none';
      progress.classList.remove('visible');
    };
  });
});
</script>

</body>
  </html>
